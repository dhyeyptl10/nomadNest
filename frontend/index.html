<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO Meta Tags ── -->
    <title>NomadNest — Plan Your Dream Travel</title>
    <meta name="description" content="NomadNest is your premium travel planning platform. Discover destinations, plan trips, manage bookings, and explore the world with confidence." />
    <meta name="keywords" content="travel, trip planning, destinations, bookings, travel app, NomadNest, wanderlust" />
    <meta name="author" content="NomadNest Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://nomadnest.travel" />

    <!-- ── Open Graph (Social Preview) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://nomadnest.travel" />
    <meta property="og:title"       content="NomadNest — Plan Your Dream Travel" />
    <meta property="og:description" content="Discover destinations, plan trips, manage bookings and explore the world with NomadNest — your premium travel companion." />
    <meta property="og:image"       content="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1200&h=630&q=80&auto=format&fit=crop" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="NomadNest — Plan Your Dream Travel" />
    <meta name="twitter:description" content="Premium travel planning platform for modern explorers." />
    <meta name="twitter:image"       content="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1200&h=630&q=80&auto=format&fit=crop" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- ── Leaflet (for Emergency map) ── -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- ── Structured Data (Schema.org) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "NomadNest",
      "description": "Premium travel planning platform",
      "url": "https://nomadnest.travel",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "Web"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
